name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Windows installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        env:
          MLULTIMATE_CURSEFORGE_PROXY_URL: ${{ secrets.MLULTIMATE_CURSEFORGE_PROXY_URL }}
        run: |
          npm run lint
          npm run build

      - name: Build installer
        env:
          MLULTIMATE_CURSEFORGE_PROXY_URL: ${{ secrets.MLULTIMATE_CURSEFORGE_PROXY_URL }}
        run: npm run build && npx electron-builder --win nsis --publish never && npm run build:online-installer

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ github.ref_name }}"
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $displayVersion = $version -replace "-alpha\.", " alpha "
          $releaseTitle = "MLUltimate Launcher $displayVersion"
          $requiredAssets = @(
            "release/MLUltimate-Launcher-$version-win-x64.exe",
            "release/MLUltimate-Launcher-$version-win-x64.exe.blockmap",
            "release/MLUltimate Installer.exe",
            "release/latest.yml"
          )

          Write-Host "Release folder contents:"
          Get-ChildItem -Path release -File | Sort-Object Name | Format-Table Name,Length -AutoSize

          foreach ($asset in $requiredAssets) {
            if (-not (Test-Path $asset)) {
              throw "Missing release asset: $asset"
            }
          }

          $assetPaths = $requiredAssets | ForEach-Object { (Resolve-Path $_).Path }

          gh release view $tag --repo $env:GITHUB_REPOSITORY 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --repo $env:GITHUB_REPOSITORY --target "${{ github.sha }}" --title $releaseTitle --notes "Atualização $displayVersion." --prerelease
          } else {
            gh release edit $tag --repo $env:GITHUB_REPOSITORY --title $releaseTitle --notes "Atualização $displayVersion." --prerelease
          }

          Write-Host "Uploading release assets:"
          $assetPaths | ForEach-Object { Write-Host " - $_" }

          gh release upload $tag @assetPaths --repo $env:GITHUB_REPOSITORY --clobber
