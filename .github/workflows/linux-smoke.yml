name: Linux package smoke test

on:
  push:
    branches:
      - "codex/linux-installer-fix"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: Install and open (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Install dependencies
        run: npm ci

      - name: Validate and build packages
        env:
          MLULTIMATE_CURSEFORGE_PROXY_URL: ${{ secrets.MLULTIMATE_CURSEFORGE_PROXY_URL }}
        run: |
          npm run lint
          npm run build
          npx electron-builder --linux deb AppImage --x64 --publish never

      - name: Install DEB
        run: |
          sudo apt-get install -y ./release/MLUltimate-Launcher-*-linux-x64.deb
          dpkg-query -W -f='${Package} ${Version} ${Status}\n' mlultimate-launcher

      - name: Open installed launcher
        env:
          MLULTIMATE_QA_HIDDEN: "1"
          MLULTIMATE_QA_EXIT_AFTER_READY: "1"
          MLULTIMATE_DATA_PATH: /tmp/mlultimate-deb-smoke
        run: |
          xvfb-run -a mlultimate-launcher --disable-gpu

      - name: Open AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          MLULTIMATE_QA_HIDDEN: "1"
          MLULTIMATE_QA_EXIT_AFTER_READY: "1"
          MLULTIMATE_DATA_PATH: /tmp/mlultimate-appimage-smoke
        run: |
          chmod +x ./release/MLUltimate-Launcher-*-linux-x64.AppImage
          xvfb-run -a ./release/MLUltimate-Launcher-*-linux-x64.AppImage --disable-gpu
